name: Close external PRs

# BeautyTasks accepts feature requests and bug reports through GitHub issues,
# not pull requests. This workflow politely closes any PR that gets opened.
on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "Thanks for your interest in BeautyTasks! 🙏",
                "",
                "This project doesn't accept pull requests. Ideas are very welcome as",
                "**feature requests through [GitHub issues](https://github.com/avnibilgin/BeautyTasks/issues)** —",
                "please open one there and describe the problem you'd like to solve.",
                "",
                "Closing this PR automatically. See [CONTRIBUTING.md](https://github.com/avnibilgin/BeautyTasks/blob/main/CONTRIBUTING.md) for details."
              ].join("\n")
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: "closed"
            });
